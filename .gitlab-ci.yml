stages:
  - test
  - e2e
  - release
  - build

test:
  stage: test
  image: node:22-alpine
  script:
    - npm ci
    - npm run build
    - npx vitest run --exclude tests/e2e/ --reporter=verbose
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore\(release\)/
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

e2e:
  stage: e2e
  image: docker:27
  services:
    - docker:27-dind
  needs: [test]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache bash curl python3 nodejs npm
    - npm ci
  script:
    - |
      # Build MCP image
      docker build -t mcp-e2e .

      # Create network
      docker network create e2e-net

      # Start Semaphore
      docker run -d --name semaphore --network e2e-net \
        -e SEMAPHORE_DB_DIALECT=bolt \
        -e SEMAPHORE_ADMIN_PASSWORD=changeme123 \
        -e SEMAPHORE_ADMIN_NAME=admin \
        -e SEMAPHORE_ADMIN_EMAIL=admin@test.local \
        -e SEMAPHORE_ADMIN=admin \
        semaphoreui/semaphore:latest

      # Wait for Semaphore
      for i in $(seq 1 60); do
        if docker exec semaphore wget -q --spider http://localhost:3000/api/ping 2>/dev/null; then
          echo "Semaphore ready"
          break
        fi
        [ "$i" -eq 60 ] && echo "Semaphore failed to start" && docker logs semaphore && exit 1
        sleep 3
      done

      # Generate API token via exec
      COOKIE_FILE=/tmp/cookie
      docker exec semaphore wget -q -O /dev/null \
        --save-cookies $COOKIE_FILE \
        --post-data='{"auth":"admin","password":"changeme123"}' \
        --header='Content-Type: application/json' \
        http://localhost:3000/api/auth/login
      TOKEN=$(docker exec semaphore wget -q -O- \
        --load-cookies $COOKIE_FILE \
        --post-data='' \
        --header='Content-Type: application/json' \
        http://localhost:3000/api/user/tokens | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
      echo "Token: ${TOKEN:0:8}..."

      # Start MCP server
      docker run -d --name mcp-e2e --network e2e-net \
        -e SEMAPHORE_URL=http://semaphore:3000 \
        -e SEMAPHORE_API_TOKEN=$TOKEN \
        -e MCP_LOG_LEVEL=debug \
        -p 3001:3001 \
        mcp-e2e node dist/index.js --http
      sleep 3

      # Run E2E tests against MCP via the Docker network
      # Connect this CI container to the e2e network
      SELF_CONTAINER=$(cat /etc/hostname)
      docker network connect e2e-net $SELF_CONTAINER
      export MCP_URL=http://mcp-e2e:3001
      npx vitest run tests/e2e/ --reporter=verbose
  after_script:
    - docker rm -f semaphore mcp-e2e 2>/dev/null || true
    - docker network rm e2e-net 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore\(release\)/
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

auto-release:
  stage: release
  image: node:22-alpine
  needs: [test, e2e]
  before_script:
    - apk add --no-cache git
    - git config user.name "CI Bot"
    - git config user.email "ci@gitlab.cybercrysis.net.au"
    - git remote set-url origin "https://oauth2:${CI_RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags
  script:
    - |
      # Get last tag or default to v0.0.0
      LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
      echo "Last tag: $LAST_TAG"

      # Determine bump type from commits since last tag
      COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
      echo "Commits since $LAST_TAG:"
      echo "$COMMITS"

      BUMP="none"
      if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
        BUMP="major"
      elif echo "$COMMITS" | grep -qiE "^feat"; then
        BUMP="minor"
      elif echo "$COMMITS" | grep -qiE "^fix"; then
        BUMP="patch"
      fi

      if [ "$BUMP" = "none" ]; then
        echo "No version bump needed (no feat/fix commits)"
        exit 0
      fi

      # Parse current version and bump
      VERSION=${LAST_TAG#v}
      MAJOR=$(echo $VERSION | cut -d. -f1)
      MINOR=$(echo $VERSION | cut -d. -f2)
      PATCH=$(echo $VERSION | cut -d. -f3)

      case $BUMP in
        major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
        patch) PATCH=$((PATCH + 1)) ;;
      esac

      NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
      echo "Bump: $BUMP → $NEW_TAG"

      # Skip if tag already exists on remote
      if git ls-remote --tags origin | grep -q "refs/tags/$NEW_TAG$"; then
        echo "Tag $NEW_TAG already exists on remote, skipping"
        exit 0
      fi

      # Update package.json version
      sed -i "s/\"version\": \".*\"/\"version\": \"${MAJOR}.${MINOR}.${PATCH}\"/" package.json
      git add package.json
      git commit -m "chore(release): ${NEW_TAG}"
      git tag -f "$NEW_TAG"
      git push origin HEAD:main
      git push origin "$NEW_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore\(release\)/

build-latest:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs: [test, e2e, auto-release]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore\(release\)/

build-release:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs: [test]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - MAJOR=$(echo $VERSION | cut -d. -f1)
    - MINOR=$(echo $VERSION | cut -d. -f1-2)
    - docker build
        -t $CI_REGISTRY_IMAGE:$VERSION
        -t $CI_REGISTRY_IMAGE:$MINOR
        -t $CI_REGISTRY_IMAGE:$MAJOR
        -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$VERSION
    - docker push $CI_REGISTRY_IMAGE:$MINOR
    - docker push $CI_REGISTRY_IMAGE:$MAJOR
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

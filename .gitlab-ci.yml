stages:
  - test
  - build

# --- Unit tests ---
test:
  stage: test
  image: node:22-alpine
  script:
    - npm ci
    - npm run build
    - npx vitest run --exclude tests/e2e/ --reporter=verbose
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore\(release\)/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# --- Build, tag, and push to both registries in one job ---
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  needs: [test]
  variables:
    DOCKERHUB_IMAGE: setswei/semaphoreui-mcp
  before_script:
    - apk add --no-cache git
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN" docker.io
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      # Determine version from conventional commits
      git fetch --tags
      LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
      echo "Last tag: $LAST_TAG"

      COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
      echo "Commits since $LAST_TAG:"
      echo "$COMMITS"

      BUMP="none"
      if echo "$COMMITS" | grep -qi "BREAKING CHANGE"; then
        BUMP="major"
      elif echo "$COMMITS" | grep -qiE "^feat"; then
        BUMP="minor"
      elif echo "$COMMITS" | grep -qiE "^fix"; then
        BUMP="patch"
      fi

      VERSION=${LAST_TAG#v}
      MAJOR=$(echo $VERSION | cut -d. -f1)
      MINOR=$(echo $VERSION | cut -d. -f2)
      PATCH=$(echo $VERSION | cut -d. -f3)

      if [ "$BUMP" != "none" ]; then
        case $BUMP in
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          patch) PATCH=$((PATCH + 1)) ;;
        esac
      fi

      NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
      NEW_TAG="v${NEW_VERSION}"
      echo "Version: $NEW_VERSION (bump: $BUMP)"

      # Build with all tags
      docker build \
        -t $CI_REGISTRY_IMAGE:latest \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        -t $CI_REGISTRY_IMAGE:$NEW_VERSION \
        -t $CI_REGISTRY_IMAGE:${MAJOR}.${MINOR} \
        -t $CI_REGISTRY_IMAGE:${MAJOR} \
        -t $DOCKERHUB_IMAGE:latest \
        -t $DOCKERHUB_IMAGE:$NEW_VERSION \
        -t $DOCKERHUB_IMAGE:${MAJOR}.${MINOR} \
        -t $DOCKERHUB_IMAGE:${MAJOR} .

      # Push to GitLab registry
      docker push $CI_REGISTRY_IMAGE:latest
      docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
      docker push $CI_REGISTRY_IMAGE:$NEW_VERSION
      docker push $CI_REGISTRY_IMAGE:${MAJOR}.${MINOR}
      docker push $CI_REGISTRY_IMAGE:${MAJOR}

      # Push to Docker Hub
      docker push $DOCKERHUB_IMAGE:latest
      docker push $DOCKERHUB_IMAGE:$NEW_VERSION
      docker push $DOCKERHUB_IMAGE:${MAJOR}.${MINOR}
      docker push $DOCKERHUB_IMAGE:${MAJOR}

      # Create git tag (no commit, no second pipeline)
      if [ "$BUMP" != "none" ]; then
        if ! git ls-remote --tags origin | grep -q "refs/tags/$NEW_TAG$"; then
          git remote set-url origin "https://oauth2:${CI_RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Tagged $NEW_TAG"
        else
          echo "Tag $NEW_TAG already exists, skipping"
        fi
      else
        echo "No version bump, skipping tag"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /^chore\(release\)/
